<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Rich Obsidian Glass Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#090d16" />
    </linearGradient>

    <!-- Coral Sunset Sharing Loop Gradient -->
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a59" />
      <stop offset="50%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>

    <!-- Electric Amber Gold Accent Gradient -->
    <linearGradient id="amberGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>

    <!-- Subtle Outer Border Glow -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 122, 89, 0.45)" />
      <stop offset="100%" stop-color="rgba(245, 158, 11, 0.15)" />
    </linearGradient>

    <!-- Soft Drop Shadow for 3D Depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ea580c" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Main Rounded Emblem Base -->
  <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2.5" />

  <!-- Dynamic Interlocking Campus Sharing 'R' Emblem -->
  <g filter="url(#glow)">
    <!-- Stem & Loop of 'R' -->
    <path
      d="M 38 32 C 38 29.8 39.8 28 42 28 L 68 28 C 83.5 28 94 37.5 94 50 C 94 60 86.5 68 74.5 70.8 L 88.6 86.8 C 90.2 88.6 88.9 91.5 86.5 91.5 L 75.2 91.5 C 73.8 91.5 72.5 90.9 71.6 89.8 L 57.8 72 L 48 72 L 48 88 C 48 90.2 46.2 92 44 92 L 42 92 C 39.8 92 38 90.2 38 88 Z M 48 38 L 48 62 L 67 62 C 75.5 62 82 57 82 50 C 82 43 75.5 38 67 38 Z"
      fill="url(#coralGrad)"
    />

    <!-- Dynamic Sharing Orbital Arch Accent -->
    <path
      d="M 32 64 C 32 46.3 46.3 32 64 32"
      fill="none"
      stroke="url(#amberGrad)"
      stroke-width="4.5"
      stroke-linecap="round"
      opacity="0.9"
    />

    <!-- Campus Verification Diamond Node -->
    <circle cx="84" cy="36" r="5.5" fill="url(#amberGrad)" />
  </g>
</svg>
