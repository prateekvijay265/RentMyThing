<svg xmlns=http://www.w3.org/2000/svg viewBox=0 0 1200 360 width=100% height=100%>
  <defs>
    <!-- Deep AI Obsidian Background -->
    <linearGradient id=bg x1=0% y1=0% x2=100% y2=100%>
      <stop offset=0% stop-color=#070a12 />
      <stop offset=50% stop-color=#0f172a />
      <stop offset=100% stop-color=#1e1b4b />
    </linearGradient>

    <!-- Neural Glow Pink/Cyan Gradients -->
    <linearGradient id=neonRose x1=0% y1=0% x2=100% y2=0%>
      <stop offset=0% stop-color=#f43f5e />
      <stop offset=100% stop-color=#fb7185 />
    </linearGradient>
    <linearGradient id=neonCyan x1=0% y1=0% x2=100% y2=0%>
      <stop offset=0% stop-color=#38bdf8 />
      <stop offset=100% stop-color=#818cf8 />
    </linearGradient>
    <linearGradient id=gold x1=0% y1=0% x2=100% y2=0%>
      <stop offset=0% stop-color=#f59e0b />
      <stop offset=100% stop-color=#fbbf24 />
    </linearGradient>

    <!-- Glassmorphic Card Filter & Gradient -->
    <linearGradient id=glassBg x1=0% y1=0% x2=100% y2=100%>
      <stop offset=0% stop-color=#ffffff stop-opacity=0.08 />
      <stop offset=100% stop-color=#ffffff stop-opacity=0.02 />
    </linearGradient>

    <filter id=glow x=-20% y=-20% width=140% height=140%>
      <feGaussianBlur stdDeviation=15 result=blur />
      <feComposite in=SourceGraphic in2=blur operator=over />
    </filter>
    <filter id=softGlow x=-10% y=-10% width=120% height=120%>
      <feGaussianBlur stdDeviation=6 result=blur />
      <feComposite in=SourceGraphic in2=blur operator=over />
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width=1200 height=360 rx=24 fill=url(#bg) />

  <!-- Cyber/AI Grid Overlay -->
  <g stroke=#ffffff stroke-opacity=0.04 stroke-width=1>
    <line x1=0 y1=60 x2=1200 y2=60 />
    <line x1=0 y1=120 x2=1200 y2=120 />
    <line x1=0 y1=180 x2=1200 y2=180 />
    <line x1=0 y1=240 x2=1200 y2=240 />
    <line x1=0 y1=300 x2=1200 y2=300 />
    <line x1=150 y1=0 x2=150 y2=360 />
    <line x1=300 y1=0 x2=300 y2=360 />
    <line x1=450 y1=0 x2=450 y2=360 />
    <line x1=600 y1=0 x2=600 y2=360 />
    <line x1=750 y1=0 x2=750 y2=360 />
    <line x1=900 y1=0 x2=900 y2=360 />
    <line x1=1050 y1=0 x2=1050 y2=360 />
  </g>

  <!-- Glowing Neural Network Nodes (AI Constellation) -->
  <g opacity=0.6>
    <circle cx=150 cy=80 r=4 fill=#38bdf8 filter=url(#softGlow) />
    <circle cx=280 cy=220 r=3 fill=#f43f5e filter=url(#softGlow) />
    <circle cx=950 cy=70 r=5 fill=#818cf8 filter=url(#softGlow) />
    <circle cx=1080 cy=260 r=4 fill=#f59e0b filter=url(#softGlow) />
    <circle cx=820 cy=300 r=3 fill=#38bdf8 filter=url(#softGlow) />
    <line x1=150 y1=80 x2=280 y2=220 stroke=#38bdf8 stroke-opacity=0.2 stroke-width=1.5 stroke-dasharray=4 4 />
    <line x1=950 y1=70 x2=1080 y2=260 stroke=#818cf8 stroke-opacity=0.2 stroke-width=1.5 />
    <line x1=950 y1=70 x2=820 y2=300 stroke=#f43f5e stroke-opacity=0.15 stroke-width=1.5 stroke-dasharray=6 6 />
  </g>

  <!-- Glowing Ambient Spheres -->
  <circle cx=200 cy=180 r=140 fill=#f43f5e opacity=0.12 filter=url(#glow) />
  <circle cx=1000 cy=180 r=160 fill=#38bdf8 opacity=0.12 filter=url(#glow) />

  <!-- Center Glassmorphic Container Panel -->
  <rect x=80 y=45 width=1040 height=270 rx=20 fill=url(#glassBg) stroke=#ffffff stroke-opacity=0.15 stroke-width=1.5 />

  <!-- Top Campus Badge -->
  <rect x=420 y=70 width=360 height=34 rx=17 fill=#0f172a stroke=url(#neonCyan) stroke-width=1.5 />
  <text x=600 y=92 font-family='Inter', system-ui, sans-serif font-size=13 font-weight=700 fill=#38bdf8 text-anchor=middle letter-spacing=2.5>
    IIT · BITS · IIM CAMPUS NETWORK
  </text>

  <!-- Main Title -->
  <text x=600 y=155 font-family='Inter', system-ui, sans-serif font-size=46 font-weight=900 fill=#ffffff text-anchor=middle letter-spacing=-1>
    RentMyThing <tspan fill=url(#neonRose)>India</tspan>
  </text>

  <!-- Subtitle with AI Highlight -->
  <text x=600 y=198 font-family='Inter', system-ui, sans-serif font-size=20 font-weight=500 fill=#cbd5e1 text-anchor=middle>
    Verified Peer-to-Peer Campus Gear Rental Protected by <tspan fill=url(#gold) font-weight=700>Google Gemini Neural AI</tspan>
  </text>

  <!-- Feature Pills Inside Glass Card -->
  <g transform=translate(600, 255)>
    <!-- Pill 1: Neural Shield -->
    <g transform=translate(-330, 0)>
      <rect x=-100 y=-18 width=200 height=36 rx=18 fill=#1e293b fill-opacity=0.8 stroke=#f43f5e stroke-opacity=0.5 stroke-width=1 />
      <circle cx=-80 cy=0 r=5 fill=#f43f5e filter=url(#softGlow) />
      <text x=5 y=5 font-family='Inter', system-ui, sans-serif font-size=13 font-weight=600 fill=#ffffff text-anchor=middle>Neural Fraud Shield</text>
    </g>
    <!-- Pill 2: Verified Students -->
    <g transform=translate(0, 0)>
      <rect x=-105 y=-18 width=210 height=36 rx=18 fill=#1e293b fill-opacity=0.8 stroke=#38bdf8 stroke-opacity=0.5 stroke-width=1 />
      <circle cx=-85 cy=0 r=5 fill=#38bdf8 filter=url(#softGlow) />
      <text x=5 y=5 font-family='Inter', system-ui, sans-serif font-size=13 font-weight=600 fill=#ffffff text-anchor=middle>.ac.in Verified Peers</text>
    </g>
    <!-- Pill 3: OTP Handover -->
    <g transform=translate(330, 0)>
      <rect x=-100 y=-18 width=200 height=36 rx=18 fill=#1e293b fill-opacity=0.8 stroke=#fbbf24 stroke-opacity=0.5 stroke-width=1 />
      <circle cx=-80 cy=0 r=5 fill=#fbbf24 filter=url(#softGlow) />
      <text x=5 y=5 font-family='Inter', system-ui, sans-serif font-size=13 font-weight=600 fill=#ffffff text-anchor=middle>Dual OTP Handovers</text>
    </g>
  </g>
</svg>
